name: build

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Verify release metadata
        run: .\scripts\verify-release.ps1

      - name: Verify installer script
        run: .\scripts\verify-installer-script.ps1

      - name: Restore
        run: .\scripts\restore.ps1 -SolutionPath .\WinAIUsageBar.sln

      - name: Build
        run: dotnet build .\WinAIUsageBar.sln --configuration Release -p:Platform=x64 --no-restore

      - name: Test
        run: dotnet test .\tests\WinAiUsageBar.Core.Tests\WinAiUsageBar.Core.Tests.csproj --configuration Release -p:Platform=x64 --no-build --verbosity normal

      - name: Publish app
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: .\scripts\publish.ps1 -Configuration Release -Runtime win-x64 -OutputPath .\artifacts\publish\WinAIUsageBar-win-x64

      - name: Smoke test published app
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: .\artifacts\publish\WinAIUsageBar-win-x64\WinAiUsageBar.App.exe --smoke-test

      - name: Package app
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: .\scripts\package.ps1 -PublishPath .\artifacts\publish\WinAIUsageBar-win-x64 -OutputDirectory .\artifacts\packages -Runtime win-x64

      - name: Install Inno Setup
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: choco install innosetup -y --no-progress

      - name: Build setup installer
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: .\scripts\build-installer.ps1 -SkipPublish -PublishPath .\artifacts\publish\WinAIUsageBar-win-x64 -OutputDirectory .\artifacts\installer -Runtime win-x64

      - name: Verify release readiness
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: .\scripts\verify-release-readiness.ps1 -PublishedAppPath .\artifacts\publish\WinAIUsageBar-win-x64\WinAiUsageBar.App.exe -PackageDirectory .\artifacts\packages -InstallerDirectory .\artifacts\installer -RequireInstaller

      - name: Upload app artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v7
        with:
          name: WinAIUsageBar-win-x64
          path: .\artifacts\publish\WinAIUsageBar-win-x64

      - name: Upload packaged app artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v7
        with:
          name: WinAIUsageBar-win-x64-package
          path: |
            .\artifacts\packages\*.zip
            .\artifacts\packages\*.zip.sha256

      - name: Upload installer artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v7
        with:
          name: WinAIUsageBar-win-x64-installer
          path: |
            .\artifacts\installer\*.exe
            .\artifacts\installer\*.exe.sha256
