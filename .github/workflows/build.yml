name: build

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore .\WinAIUsageBar.sln

      - name: Build
        run: dotnet build .\WinAIUsageBar.sln --configuration Release -p:Platform=x64 --no-restore

      - name: Test
        run: dotnet test .\tests\WinAiUsageBar.Core.Tests\WinAiUsageBar.Core.Tests.csproj --configuration Release -p:Platform=x64 --no-build --verbosity normal

      - name: Publish app
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: .\scripts\publish.ps1 -Configuration Release -Runtime win-x64 -OutputPath .\artifacts\publish\WinAIUsageBar-win-x64

      - name: Smoke test published app
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: .\artifacts\publish\WinAIUsageBar-win-x64\WinAiUsageBar.App.exe --smoke-test

      - name: Package app
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: .\scripts\package.ps1 -PublishPath .\artifacts\publish\WinAIUsageBar-win-x64 -OutputDirectory .\artifacts\packages -PackageName WinAIUsageBar-win-x64

      - name: Upload app artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v7
        with:
          name: WinAIUsageBar-win-x64
          path: .\artifacts\publish\WinAIUsageBar-win-x64

      - name: Upload packaged app artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v7
        with:
          name: WinAIUsageBar-win-x64-package
          path: |
            .\artifacts\packages\WinAIUsageBar-win-x64.zip
            .\artifacts\packages\WinAIUsageBar-win-x64.zip.sha256
