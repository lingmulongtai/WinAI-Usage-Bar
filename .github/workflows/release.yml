name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  draft-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Verify release metadata
        run: .\scripts\verify-release.ps1 -TagName $env:GITHUB_REF_NAME

      - name: Verify installer script
        run: .\scripts\verify-installer-script.ps1

      - name: Restore
        run: .\scripts\restore.ps1 -SolutionPath .\WinAIUsageBar.sln

      - name: Build
        run: dotnet build .\WinAIUsageBar.sln --configuration Release -p:Platform=x64 --no-restore

      - name: Test
        run: dotnet test .\tests\WinAiUsageBar.Core.Tests\WinAiUsageBar.Core.Tests.csproj --configuration Release -p:Platform=x64 --no-build --verbosity normal

      - name: Publish app
        run: .\scripts\publish.ps1 -Configuration Release -Runtime win-x64 -OutputPath .\artifacts\publish\WinAIUsageBar-win-x64

      - name: Smoke test published app
        run: .\artifacts\publish\WinAIUsageBar-win-x64\WinAiUsageBar.App.exe --smoke-test

      - name: Package app
        run: .\scripts\package.ps1 -PublishPath .\artifacts\publish\WinAIUsageBar-win-x64 -OutputDirectory .\artifacts\packages -Runtime win-x64

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build setup installer
        run: .\scripts\build-installer.ps1 -SkipPublish -PublishPath .\artifacts\publish\WinAIUsageBar-win-x64 -OutputDirectory .\artifacts\installer -Runtime win-x64

      - name: Verify release readiness
        run: .\scripts\verify-release-readiness.ps1 -TagName $env:GITHUB_REF_NAME -PublishedAppPath .\artifacts\publish\WinAIUsageBar-win-x64\WinAiUsageBar.App.exe -PackageDirectory .\artifacts\packages -InstallerDirectory .\artifacts\installer -RequireInstaller

      - name: Create draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $assets = @()
          $assets += Get-ChildItem -LiteralPath .\artifacts\packages -Filter "*.zip" | Select-Object -ExpandProperty FullName
          $assets += Get-ChildItem -LiteralPath .\artifacts\packages -Filter "*.zip.sha256" | Select-Object -ExpandProperty FullName
          $assets += Get-ChildItem -LiteralPath .\artifacts\installer -Filter "*.exe" | Select-Object -ExpandProperty FullName
          $assets += Get-ChildItem -LiteralPath .\artifacts\installer -Filter "*.exe.sha256" | Select-Object -ExpandProperty FullName

          if ($assets.Count -lt 4) {
            throw "Expected zip, zip checksum, setup exe, and setup checksum assets."
          }

          gh release create $env:GITHUB_REF_NAME @assets `
            --repo $env:GITHUB_REPOSITORY `
            --draft `
            --title "WinAI Usage Bar $env:GITHUB_REF_NAME" `
            --generate-notes
